<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Exchange RAG Chatbot (Static)</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary-color: #6366f1; --primary-hover: #4f46e5; --dark-bg: #0f172a; --card-bg: #1e293b; --text-primary: #f8fafc; --text-secondary: #94a3b8; --accent-color: #10b981; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--dark-bg); color: var(--text-primary); min-height: 100vh; }
        .container { max-width: 900px; margin: 0 auto; padding: 20px; }
        header { text-align: center; padding: 30px; margin-bottom: 20px; }
        header h1 { font-size: 2.5rem; margin-bottom: 10px; background: linear-gradient(90deg, #6366f1, #8b5cf6); -webkit-background-clip: text; color: transparent; }
        .status-banner { text-align: center; padding: 10px; border-radius: 8px; margin-bottom: 20px; }
        .success { background: #10b9811a; border: 1px solid #10b981; }
        .warning { background: #f59e0b1a; border: 1px solid #f59e0b; }
        .main-content { display: grid; gap: 20px; }
        @media (min-width: 768px) { .main-content { grid-template-columns: 1fr 250px; } }
        .chat-container, .sidebar-content { background: var(--card-bg); border-radius: 16px; padding: 20px; }
        .sidebar-content { box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3); position: sticky; top: 20px; }
        .chat-messages, .sidebar-content { height: calc(100vh - 250px); overflow-y: auto; padding-right: 10px; margin-bottom: 20px; }
        .message { padding: 12px 16px; border-radius: 12px; margin-bottom: 15px; }
        .message.user { background: var(--primary-color); margin-left: auto; max-width: 85%; }
        .message.ai { background: #374151; }
        .example-questions, .sidebar-title { margin-bottom: 15px; font-weight: 600; }
        .example-question { display: inline-block; background: #374151; padding: 8px 16px; border-radius: 20px; margin-right: 8px; margin-bottom: 8px; cursor: pointer; }
        .example-question:hover { background: var(--primary-color); color: white; }
        .api-key-container, .source-item { background: #374151; border-radius: 8px; padding: 12px; }
        textarea, .api-key-input { width: 100%; background: #1e293b; border: 1px solid #475569; color: var(--text-primary); padding: 12px; border-radius: 8px; }
        textarea:focus, .api-key-input:focus, button:hover { outline: none; border-color: var(--primary-color); }
        button.send-btn { background: var(--primary-color); color: white; border: none; padding: 12px 24px; border-radius: 8px; font-weight: 600; }
        button.send-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .source-title, .source-link { font-weight: 600; color: var(--accent-color); text-decoration: none; }
        .source-meta { font-size: 0.85rem; color: var(--text-secondary); }
        .loader { width: 40px; height: 40px; border: 3px solid rgba(99,102,241,0.3); border-radius: 50%; border-top-color: var(--primary-color); animation: spin 1s infinite; margin: 20px auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
<div class="container">
<header>
<h1><i class="fa-solid fa-comments"></i> AI Exchange Q&A (Static)</h1>
<p>Ask questions about AI conference talks</p>

<div class="api-key-container">
<label><i class="fa-solid fa-key"></i> OpenRouter API Key <span id="apiStatus" style="color: #f59e0b;">Required</span></label>
<input type="password" id="apiKeyInput" class="api-key-input" placeholder="sk-...">
</div>

<div id="indexStatus" class="status-banner warning">
<i class="fa-solid fa-exclamation-triangle"></i> Click "Build Index" below to load data
</div>
<button id="buildIndexBtn" style="width: 100%; padding: 12px; background: var(--primary-color); color: white; border: none; border-radius: 8px; margin-bottom: 20px;">Build Index</button>
</header>

<div class="main-content">
<div class="chat-container">
<div class="example-questions" id="exampleQuestions"></div>
<div class="chat-messages" id="chatMessages">
<div class="message ai"><i class="fa-solid fa-robot"></i> Enter an API key above and click "Build Index" to get started.</div>
</div>
<div style="display: flex; gap: 10px;">
<textarea id="questionInput" placeholder="Ask a question..."></textarea>
<button class="send-btn" id="sendBtn"><i class="fa-solid fa-paper-plane"></i></button>
</div>
</div>

<div class="sidebar-content">
<div class="sidebar-title">Sources</div>
<div id="sourcesList"><p style="color: var(--text-secondary); font-size: 0.9rem;">Sources appear here after you get an answer.</p></div>
</div>
</div>

<script>
let apiKey = localStorage.getItem('apiKey') || '';
const exampleQuestions = [
    "What are the key trends in enterprise AI adoption?",
    "Which speakers discussed MLOps challenges?", 
    "What advice was given about AI team building?"
];
let chunks = [];

document.getElementById('apiKeyInput').value = apiKey;

// Initialize
exampleQuestions.forEach(q => {
    const btn = document.createElement('button');
    btn.className = 'example-question';
    btn.textContent = q;
    btn.onclick = () => { questionInput.value = q; handleQuestion(); };
    exampleQuestionsDiv.appendChild(btn);
});

updateStatus();
document.getElementById('buildIndexBtn').onclick = () => {
    chunks = [
        { text: "Enterprise AI adoption is accelerating with HTTPI frameworks", metadata: { title: "Beyond LLMOps", channel: "The Exchange" } },
        { text: "Observability is critical for mission-critical systems", metadata: { title: "From Zero to Observable", channel: "The Exchange" } },
        { text: "MLOps challenges include model versioning and deployment", metadata: { title: "AI Agents Explained", channel: "The Exchange" } }
    ];
    document.getElementById('indexStatus').innerHTML = '<i class="fa-solid fa-check-circle"></i> ' + chunks.length + ' chunks loaded';
    document.getElementById('indexStatus').className = 'status-banner success';
};

// Event handlers
document.getElementById('apiKeyInput').addEventListener('input', e => {
    apiKey = e.target.value.trim();
    localStorage.setItem('apiKey', apiKey);
    updateStatus();
});

questionInput.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleQuestion(); } });
questionInput.addEventListener('input', () => { questionInput.style.height = 'auto'; questionInput.style.height = (questionInput.scrollHeight) + 'px'; });
sendBtn.addEventListener('click', handleQuestion);

async function updateStatus() {
    const el = document.getElementById('apiStatus');
    if (apiKey) { el.textContent = 'Connected'; el.style.color = '#10b981'; }
    else { el.textContent = 'Required'; el.style.color = '#f59e0b'; }
}

async function handleQuestion() {
    const question = questionInput.value.trim();
    if (!question) return;
    
    addMessage(question, 'user');
    questionInput.value = '';
    
    const loadingId = addLoading();
    try {
        if (!apiKey) throw new Error('Please enter an OpenRouter API key first');
        
        const answer = await callOpenRouter(buildPrompt(question));
        document.getElementById(loadingId).remove();
        addMessage(answer, 'ai');
        
        const sourcesList = document.getElementById('sourcesList');
        sourcesList.innerHTML = chunks.map((c, i) => {
            const meta = c.metadata || {};
            return `<div class="source-item">
                <div class="source-title">${escapeHtml(meta.title || 'Unknown')}</div>
                <div class="source-meta">${escapeHtml(meta.channel || '')}</div>
                <a class="source-link" href="https://youtube.com">Watch on YouTube</a>
                <div class="source-meta">"${c.text.substring(0, 150)}..."</div>
            </div>`;
        }).join('');
    } catch (e) {
        document.getElementById(loadingId).innerHTML = '<div style="color: #ef4444;">Error: ' + escapeHtml(e.message) + '</div>';
    }
}

function addLoading() {
    const id = 'loading-' + Date.now();
    const el = document.createElement('div');
    el.className = 'message ai';
    el.id = id;
    el.innerHTML = `<div class="loader"></div>`;
    chatMessages.appendChild(el);
    scrollToBottom();
    return id;
}

function addMessage(text, type) {
    const msg = document.createElement('div');
    msg.className = 'message ' + type;
    msg.innerHTML = `<div>${escapeHtml(text).replace(/\n/g, '<br>')}</div>`;
    chatMessages.appendChild(msg);
    scrollToBottom();
}

function buildPrompt(question) {
    const context = chunks.map((c, i) => `[Chunk ${i+1}] ${c.text}`).join('\\n\\n');
    return `Question: ${question}\\n\\nContext: ${context}`;
}

async function callOpenRouter(prompt) {
    const response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
        method: 'POST',
        headers: {
            'Authorization': `Bearer ${apiKey}`,
            'HTTP-Referer': window.location.href,
            'Content-Type': 'application/json'
        },
        body: JSON.stringify({
            model: 'openai/gpt-3.5-turbo',
            messages: [
                { role: 'system', content: 'You are a helpful AI assistant.' },
                { role: 'user', content: prompt }
            ],
            temperature: 0.7
        })
    });
    
    if (!response.ok) throw new Error('API error: ' + response.statusText);
    const data = await response.json();
    return data.choices[0].message.content;
}

function escapeHtml(unsafe) {
    return unsafe ? unsafe.replace(/[&<>"]/g, c => 
        ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]) ) : '';
}

function scrollToBottom() { chatMessages.scrollTop = chatMessages.scrollHeight; }
</script>
</div>
</body>
</html>
