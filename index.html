<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Exchange - Video Analytics Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            background: #0a0a0a; color: #fff; line-height: 1.6;
        }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        .header { text-align: center; margin-bottom: 40px; }
        .header h1 { color: #00d4ff; font-size: 2.5em; margin-bottom: 10px; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .stat-card { background: #1a1a1a; border: 1px solid #333; border-radius: 8px; padding: 20px; text-align: center; }
        .stat-number { font-size: 2.5em; color: #00d4ff; font-weight: bold; }
        .stat-label { color: #aaa; margin-top: 5px; }
        .section { background: #1a1a1a; border: 1px solid #333; border-radius: 8px; padding: 30px; margin-bottom: 30px; }
        .section h2 { color: #00d4ff; margin-bottom: 20px; }
        .video-list { display: grid; gap: 15px; }
        .video-item { background: #2a2a2a; padding: 15px; border-radius: 6px; display: flex; justify-content: space-between; align-items: center; }
        .video-title { font-weight: 500; }
        .video-meta { font-size: 0.9em; color: #aaa; }
        .sentiment-badge { padding: 4px 8px; border-radius: 12px; font-size: 0.8em; }
        .sentiment-positive { background: #0f5132; color: #75b798; }
        .sentiment-neutral { background: #495057; color: #adb5bd; }
        .sentiment-negative { background: #842029; color: #ea868f; }
        .topic-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        .topic-card { background: #2a2a2a; padding: 15px; border-radius: 6px; }
        .topic-name { font-weight: 500; color: #00d4ff; margin-bottom: 5px; }
        .topic-stats { font-size: 0.9em; color: #aaa; }
        .search-box { width: 100%; padding: 12px; background: #2a2a2a; border: 1px solid #444; border-radius: 6px; color: #fff; margin-bottom: 20px; }
        .filter-tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .filter-tab { padding: 8px 16px; background: #2a2a2a; border: none; color: #aaa; border-radius: 4px; cursor: pointer; }
        .filter-tab.active { background: #00d4ff; color: #000; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎯 AI Exchange Analytics</h1>
            <p>Real-time insights from video content analysis</p>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-number">247</div>
                <div class="stat-label">Videos Analyzed</div>
            </div>
            <div class="stat-card">
                <div class="stat-number">1.2M</div>
                <div class="stat-label">Total Views</div>
            </div>
            <div class="stat-card">
                <div class="stat-number">89</div>
                <div class="stat-label">Unique Speakers</div>
            </div>
            <div class="stat-card">
                <div class="stat-number">156</div>
                <div class="stat-label">Topics Identified</div>
            </div>
        </div>

        <div class="section">
            <h2>🎥 Recent Video Analysis</h2>
            <input type="text" class="search-box" placeholder="Search videos, topics, or speakers..." id="searchBox">
            <div class="filter-tabs">
                <button class="filter-tab active" data-filter="all">All</button>
                <button class="filter-tab" data-filter="high-sentiment">Positive</button>
                <button class="filter-tab" data-filter="technical">Technical</button>
                <button class="filter-tab" data-filter="recent">Recent</button>
            </div>
            <div class="video-list" id="videoList">
                <!-- Videos populated by JavaScript -->
            </div>
        </div>

        <div class="section">
            <h2>🏷️ Trending Topics</h2>
            <div class="topic-grid" id="topicGrid">
                <!-- Topics populated by JavaScript -->
            </div>
        </div>

        <div class="section">
            <h2>📊 Speaker Analytics</h2>
            <div id="speakerAnalytics">
                <!-- Speaker data populated by JavaScript -->
            </div>
        </div>
    </div>

    <script>
        const data = {"videos": [{"id": 1, "title": "AI Safety Discussion", "duration": 3600, "sentiment": 0.3, "topics": ["safety", "alignment", "ethics"]}, {"id": 2, "title": "Technical Deep Dive", "duration": 2400, "sentiment": 0.1, "topics": ["architecture", "performance", "scaling"]}, {"id": 3, "title": "Industry Panel", "duration": 5400, "sentiment": 0.7, "topics": ["business", "applications", "future"]}, {"id": 4, "title": "Research Review", "duration": 1800, "sentiment": -0.1, "topics": ["papers", "methodology", "results"]}], "speakers": [{"name": "Dr. Sarah Chen", "expertise": ["AI Safety", "Ethics"], "videos": 8, "avg_sentiment": 0.2}, {"name": "Alex Rodriguez", "expertise": ["Engineering", "Systems"], "videos": 12, "avg_sentiment": 0.4}, {"name": "Prof. Michael Kim", "expertise": ["Research", "Theory"], "videos": 6, "avg_sentiment": -0.1}], "topics": {"safety": {"count": 15, "sentiment": 0.1, "growth": 0.23}, "performance": {"count": 22, "sentiment": 0.4, "growth": 0.18}, "ethics": {"count": 11, "sentiment": 0.2, "growth": 0.31}, "business": {"count": 18, "sentiment": 0.6, "growth": 0.15}}};
        
        function getSentimentClass(sentiment) {
            if (sentiment > 0.2) return 'sentiment-positive';
            if (sentiment < -0.1) return 'sentiment-negative';
            return 'sentiment-neutral';
        }
        
        function getSentimentLabel(sentiment) {
            if (sentiment > 0.2) return 'Positive';
            if (sentiment < -0.1) return 'Negative';
            return 'Neutral';
        }
        
        function renderVideos() {
            const videoList = document.getElementById('videoList');
            videoList.innerHTML = data.videos.map(video => ).join('');
        }
        
        function renderTopics() {
            const topicGrid = document.getElementById('topicGrid');
            topicGrid.innerHTML = Object.entries(data.topics).map(([topic, stats]) => ).join('');
        }
        
        function renderSpeakers() {
            const speakerAnalytics = document.getElementById('speakerAnalytics');
            speakerAnalytics.innerHTML = data.speakers.map(speaker => ).join('');
        }
        
        // Initialize dashboard
        renderVideos();
        renderTopics();
        renderSpeakers();
        
        // Search functionality
        document.getElementById('searchBox').addEventListener('input', function(e) {
            const query = e.target.value.toLowerCase();
            const videos = document.querySelectorAll('.video-item');
            videos.forEach(video => {
                const text = video.textContent.toLowerCase();
                video.style.display = text.includes(query) ? 'flex' : 'none';
            });
        });
        
        // Filter tabs
        document.querySelectorAll('.filter-tab').forEach(tab => {
            tab.addEventListener('click', function() {
                document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
                this.classList.add('active');
                // Filter logic would go here
            });
        });
        
        // Simulate real-time updates
        setInterval(() => {
            const cards = document.querySelectorAll('.stat-card');
            const randomCard = cards[Math.floor(Math.random() * cards.length)];
            const number = randomCard.querySelector('.stat-number');
            const currentVal = parseInt(number.textContent.replace(/[^0-9]/g, ''));
            number.textContent = (currentVal + Math.floor(Math.random() * 3)).toLocaleString();
            
            randomCard.style.borderColor = '#00d4ff';
            setTimeout(() => randomCard.style.borderColor = '#333', 2000);
        }, 5000);
    </script>
</body>
</html><!-- Force update Tue Mar 31 09:23:38 AM UTC 2026 -->
